; Project-level PHP overrides for uploads
; Railway-optimized configuration
upload_max_filesize = 256M
post_max_size = 256M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
file_uploads = On

; Note: For production, consider implementing chunked uploads for very large files
; Railway's ephemeral filesystem is best for temporary uploads
; Use cloud storage (S3, etc) for persistent file storage
